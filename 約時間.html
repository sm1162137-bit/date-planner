<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>約旭全出門</title>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Space+Grotesk:wght@400;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --accent: #7c6ff7;
    --accent2: #a78bfa;
    --text: #e8e8f0;
    --muted: #8888a0;
    --border: #2e2e3e;
    --success: #4ade80;
    --radius: 16px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Header */
  header {
    width: 100%;
    padding: 48px 24px 32px;
    text-align: center;
    position: relative;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 60px; height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
  }

  .eyebrow {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 16px;
  }

  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 700;
    background: linear-gradient(135deg, #fff 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.15;
    margin-bottom: 12px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 15px;
    font-weight: 300;
    line-height: 1.6;
  }

  /* Main layout */
  main {
    width: 100%;
    max-width: 900px;
    padding: 48px 24px 80px;
    display: flex;
    flex-direction: column;
    gap: 32px;
  }

  /* Calendar section */
  .section-label {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label::before {
    content: '';
    width: 4px; height: 4px;
    background: var(--accent);
    border-radius: 50%;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .calendar-wrapper {
    padding: 24px;
  }

  .calendar-wrapper iframe {
    width: 100%;
    height: 600
px;
    border: none;
    border-radius: 10px;
    background: #fff;
  }

  .calendar-note {
    margin-top: 12px;
    font-size: 13px;
    color: var(--muted);
    text-align: center;
  }

  /* Form */
  .form-wrapper {
    padding: 32px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .form-group.full {
    grid-column: 1 / -1;
  }

  label {
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  input, textarea, select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 15px;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%;
  }

  input:focus, textarea:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124, 111, 247, 0.15);
  }

input[type="datetime-local"]::-webkit-calendar-picker-indicator {
    filter: invert(1) opacity(0.5);
    cursor: pointer;
    position: absolute;
    left: 0;
    right: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
  }

  #date {
    position: relative;
    cursor: pointer;

  }

  textarea {
    resize: vertical;
    min-height: 90px;
  }

  /* Activity chips */
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .chip {
    padding: 8px 16px;
    border-radius: 99px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }

  .chip:hover { border-color: var(--accent); color: var(--text); }
  .chip.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 500;
  }

  /* Submit button */
  .btn-submit {
    width: 100%;
    margin-top: 8px;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 12px;
    color: #fff;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 0.5px;
  }

  .btn-submit:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-submit:active { transform: translateY(0); }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Success state */
  .success-state {
    display: none;
    text-align: center;
    padding: 48px 32px;
  }

  .success-icon {
    width: 64px; height: 64px;
    background: rgba(74, 222, 128, 0.1);
    border: 2px solid var(--success);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    margin: 0 auto 20px;
  }

  .success-state h2 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px;
    color: var(--success);
    margin-bottom: 8px;
  }

  .success-state p { color: var(--muted); font-size: 15px; }

  /* Error msg */
  .error-msg {
    display: none;
    background: rgba(248, 113, 113, 0.1);
    border: 1px solid rgba(248, 113, 113, 0.3);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 14px;
    color: #f87171;
    margin-top: 12px;
  }

  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    .form-wrapper { padding: 24px; }
  }
</style>
</head>
<body>

<header>
  <p class="eyebrow">你有空嗎</p>
  <h1>出門! 👋</h1>
  <p class="subtitle">看看我哪個時間有空，挑一個你方便的時間填過來</p>
</header>

<main>

  <!-- 行事曆 -->
  <div>
    <p class="section-label">我的行程</p>
    <div class="card">
      <div class="calendar-wrapper">
        <iframe src="https://calendar.google.com/calendar/embed?src=sm1162137%40gmail.com&ctz=Asia%2FTaipei" style="border: 0" width="800" height="600" frameborder="0" scrolling="no"></iframe>
  <!-- 表單 -->
  <div>
    <p class="section-label">選你想約的時間</p>
    <div class="card">
      <div class="form-wrapper" id="formWrapper">
        <div class="form-grid">
          <div class="form-group full">
            <label>想約幾月幾號幾點？</label>
            <input type="datetime-local" id="date" required>
          </div>

          <div class="form-group full">
            <label>想做什麼？</label>
            <div class="chips" id="chips">
              <span class="chip" data-val="看電影">🎬 看電影</span>
              <span class="chip" data-val="吃飯">🍜 吃飯</span>
              <span class="chip" data-val="喝咖啡">☕ 喝咖啡</span>
              <span class="chip" data-val="逛街">🛍️ 逛街</span>
              <span class="chip" data-val="其他">✨ 其他</span>
            </div>
          </div>

          <div class="form-group full">
            <label>備註（可選）</label>
            <textarea id="note" placeholder="有什麼想說的都可以寫這裡..."></textarea>
          </div>

        </div>

        <button class="btn-submit" id="submitBtn" onclick="sendForm()">傳送 →</button>
        <div class="error-msg" id="errorMsg"></div>
      </div>

      <!-- 成功畫面 -->
      <div class="success-state" id="successState">
        <div class="success-icon">✓</div>
        <h2>收到了！</h2>
        <p>旭全會看到你的邀約，等他回覆你 😊</p>
      </div>
    </div>
  </div>

</main>

<script>
  // EmailJS 初始化
  emailjs.init('Te3BC0YuZ3TprQlt8');

  // 活動 chips 複選
  let selectedActivities = new Set();
  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      if (selectedActivities.has(chip.dataset.val)) {
        selectedActivities.delete(chip.dataset.val);
        chip.classList.remove('active');
      } else {
        selectedActivities.add(chip.dataset.val);
        chip.classList.add('active');
      }
    });
  });

  // 送出
  async function sendForm() {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const date = document.getElementById('date').value;
    const note = document.getElementById('note').value.trim();
    const errorMsg = document.getElementById('errorMsg');
    const submitBtn = document.getElementById('submitBtn');

    // 驗證
    errorMsg.style.display = 'none';
    if (!name) { showError('請填寫你的名字'); return; }
    if (!date) { showError('請選擇想約的時間'); return; }
    if (!selectedActivities.size) { showError('請選擇想做什麼'); return; }

    // 格式化時間
    const dateObj = new Date(date);
    const formattedDate = dateObj.toLocaleString('zh-TW', {
      year: 'numeric', month: 'long', day: 'numeric',
      weekday: 'long', hour: '2-digit', minute: '2-digit'
    });

    const activityStr = [...selectedActivities].join('、');

    submitBtn.disabled = true;
    submitBtn.textContent = '傳送中...';

    try {
      await emailjs.send('service_c8gbqpi', 'template_bvo0fd6', {
        name: name,
        email: email || '未填寫',
        date: formattedDate,
        activity: activityStr,
        note: note || '無',
        title: `${activityStr} - ${name}`
      });

      // 成功
      document.getElementById('formWrapper').style.display = 'none';
      document.getElementById('successState').style.display = 'block';

    } catch (err) {
      submitBtn.disabled = false;
      submitBtn.textContent = '傳給旭全 →';
      showError('傳送失敗，請稍後再試 😢');
      console.error(err);
    }
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
  }
</script>

</body>
</html>
